{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    
    <div class="container-fluid">
        <div class="row min-vh-100">
            <div class="col-lg-6 d-flex flex-column justify-content-center align-items-center text-center p-5 left-banner">
                <h2 class="display-4 font-weight-bold text-white">Welcome to MediCare</h2>
                <p class="lead text-white mt-3">Your trusted healthcare companion for appointments, records, and more</p>
            </div>

            <div class="col-lg-6 d-flex flex-column justify-content-center p-md-5 p-4 bg-white">
    <div class="form-wrapper mx-auto" style="width: 100%; max-width: 400px;">
        <h2 class="font-weight-bold">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIdSdz_l9F0FhTWLfv8Kr0Z9CkHO3_VCScfQ&s" style="width: 60px; height: auto;">
            MediCare
        </h2>
        <h1 class="h3 mb-4 font-weight-bold">Sign in to your account</h1>

        {% if er %}
        <div class="alert alert-custom d-flex align-items-center shadow-sm" role="alert">
            <i class="fas fa-user-shield mr-3"></i>
            <div>{{ er }}</div>
        </div>
        {% endif %}

        <form class="fm" method="post">
            {% csrf_token %}
            <input type="hidden" name="role" id="user_role" value="patient">
            
            <div class="form-group">
                <label class="small font-weight-bold text-muted">Username</label>
                <input name="uname" type="text" placeholder="Enter your username" class="form-control custom-input shadow-none">
            </div>
            
            <div class="form-group">
                <label class="small font-weight-bold text-muted">Password</label>
                <input name="psw1" type="password" placeholder="••••••••" class="form-control custom-input shadow-none">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg gradient-btn font-weight-bold">Login</button>
        </form>

        <p class="text-muted mt-4 text-center" style="font-size: 16px;">
            Don't have an account? <a href="/index/" class="font-weight-bold text-primary text-decoration-none">Sign up</a>
        </p>

        <div class="text-center mt-4" style="font-size: 16px;">
            <a href="/" class="text-muted text-decoration-none"><i class="fas fa-chevron-left mr-1"></i> Back to HomePage</a>
        </div>
    </div>
</div>
</body>
</html>
