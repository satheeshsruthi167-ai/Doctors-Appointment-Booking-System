{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-sm navbar-light shadow-sm" style="background-color:#e3f2fd;">
      <a class="navbar-brand" href="/"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIdSdz_l9F0FhTWLfv8Kr0Z9CkHO3_VCScfQ&s" style="width: 80px;height: 50px;" alt="">MediCare</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto text-center">
                <li class="nav-item active">
                    <a class="nav-link" href="/">Home </a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="/about/">About</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="/doctorlist/">Doctors</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="/contact/">Contact</a>
                </li>
    </div>
    </nav>


    <div class="heading">
        <h1 class="text-heading font-bold">Welcome to MediCare</h1>     
    </div>
    <h3 class="text-muted text-center" style="margin-bottom: 40px; margin-top: 40px;"> Existing user please Log in to continue.New users can sign up by clicking the Sign up button </h3>
    <div class="container my-5">
    <div class="row">
        
        <div class="col-12 col-md-4 mb-4">
            <div class="card h-100">
                <img class="card-img-top p-3" src="{% static 'images/admin.png' %}" alt="Admin">
                <div class="card-body">
                    <h4 class="card-title">ADMIN</h4>
                    <a href="/login/" class="btn btn-success btn-block">Log in</a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 mb-4">
            <div class="card h-100">
                <img class="card-img-top p-3" src="{% static 'images/doctor.png' %}" alt="Doctor">
                <div class="card-body">
                    <h4 class="card-title">DOCTOR</h4>
                    <div class="d-flex flex-column gap-2">
                        <a href="/login/" class="btn btn-success mb-2">Log in</a>
                        <a href="/doctor_signup/" class="btn btn-primary">Sign up</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 mb-4">
            <div class="card h-100">
                <img class="card-img-top p-3" src="{% static 'images/patient.jpg' %}" alt="Patient">
                <div class="card-body">
                    <h4 class="card-title">PATIENT</h4>
                    <div class="d-flex flex-column gap-2">
                        <a href="/login/" class="btn btn-success mb-2">Log in</a>
                        <a href="/patient_signup/" class="btn btn-primary">Sign up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
