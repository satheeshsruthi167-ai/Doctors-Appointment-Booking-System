{% extends 'admin_dashboard_navbar.html' %}
{% load static %}

{% block title %}
Update Patient(admin)
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0"><i class="fas fa-user-plus mr-2"></i> UPDATE PATIENT DETAILS</h4>
        </div>
        <div class="card-body p-4" style="background-color: rgb(211, 191, 127);">
            <form method="POST">
                {% csrf_token %}        
                <div class="row">
                    <div class="col-md-12">
                        <h5 class="text-primary text-center border-bottom pb-2 mb-3" style="font-size: 22px;"> ACCOUNT DETAILS</h5>                       
                        {{ user_form.as_p }}
                    </div>
                </div>

                <hr style="border-color: black;">

                <div class="row mt-4">
                    <div class="col-md-12">
                        <h5 class="text-primary text-center border-bottom pb-2 mb-3" style="font-size: 22px;">PATIENT PROFILE</h5>
                        {{ profile_form.as_p }}
                    </div>
                </div>

                <div class="text-right mt-4">
                    <a href="/adminviewpatient/" class="btn btn-secondary mr-2">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4">Update</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
